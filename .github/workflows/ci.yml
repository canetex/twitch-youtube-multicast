# Mesmo fluxo que o Netlify usa na instalação + build (sem deploy — isso continua no painel Netlify ou via CLI com token).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Testes
        run: npm test

      - name: Build (equivalente ao Netlify)
        run: npm run build

      - name: Artefatos dist/
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
