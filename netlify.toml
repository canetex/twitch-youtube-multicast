# Documentação: https://docs.netlify.com/configure-builds/file-based-configuration/
#
# SPA estática (Vite → dist/). O Netlify pode injetar @netlify/plugin-nextjs (log: “Using Next.js Runtime”)
# mesmo sem aparecer em Build plugins. NETLIFY_NEXT_PLUGIN_SKIP desativa o runtime na build:
# https://docs.netlify.com/build/configure-builds/environment-variables/#netlify-configuration-variables

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
