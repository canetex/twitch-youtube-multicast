# Documentação: https://docs.netlify.com/configure-builds/file-based-configuration/
#
# SPA estática (Vite → dist/). Se no painel Netlify existir o plugin “Next.js Runtime”
# (@netlify/plugin-nextjs), remova-o em Site configuration → Build & deploy → Plugins:
# caso contrário o build pode passar e o deploy falhar (“does not contain Next.js build output”).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
